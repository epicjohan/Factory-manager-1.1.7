      padding: 14px 24px;

      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100
    }

    header h1 {
      font-size: 14px;
      font-weight: 600
    }

    header p {
      font-size: 12px;
      color: #8B949E
    }

    .toolbar {
      background: #161B22;
      border-bottom: 1px solid #30363D;
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      align-items: center
    }

    .toolbar input {
      background: #1C2128;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 6px 12px;
      color: #E6EDF3;
      font-size: 13px;
      width: 220px;
      outline: none
    }

    .toolbar input:focus {
      border-color: #0A84FF
    }

    .btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #30363D;
      background: #1C2128;
      color: #E6EDF3;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s
    }

    .btn:hover {
      border-color: #0A84FF;
      color: #0A84FF
    }

    .btn-blue {
      background: #0A84FF;
      border-color: #0A84FF;
      color: #fff
    }

    .btn-blue:hover {
      background: #0070E0;
      color: #fff
    }

    .count {
      margin-left: auto;
      font-size: 12px;
      color: #8B949E
    }

    .count strong {
      color: #3FB950
    }

    .wrap {
      padding: 20px 24px
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #8B949E;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 0 10px 10px;
      border-bottom: 1px solid #30363D
    }

    th:first-child {
      width: 44px
    }

    th:nth-child(2) {
      width: 180px
    }

    tbody tr {
      border-bottom: 1px solid #21262D;
      transition: background .1s
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, .02)
    }

    td {
      padding: 10px 10px;
      vertical-align: middle
    }

    .num {
      color: #6B7280;
      font-size: 11px;
      font-family: monospace;
      text-align: right
    }

    .iname {
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      color: #E6EDF3
    }

    .ilib {
      font-size: 10px;
      color: #6B7280;
      margin-top: 2px
    }

    .ibox {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #1C2128;
      border: 1px solid #30363D;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      flex-shrink: 0
    }

    .ibox:hover {
      border-color: #0A84FF;
      background: #0D2044
    }

    .ibox.sel {
      border-color: #0A84FF;
      background: #0D2044
    }

      content: '✓';
      position: absolute;
      top: -5px;
      right: -5px;
      background: #0A84FF;
      color: #fff;
      font-size: 8px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 13px;
      text-align: center
    }

    .iconify {
      color: #8B949E;
      width: 20px;
      height: 20px
    }

    .ibox.sel .iconify {
      color: #0A84FF
    }

    .ibox:hover .iconify {
      color: #E6EDF3
    }

      font-size: 10px;
      color: #6B7280;
      text-align: center;
      margin-top: 2px;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .owrap {
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .opts {

    }

      color: #3FB950;
      font-family: monospace
    }

      font-size: 11px;
      color: #6B7280
    }

      right: 24px;

      border-radius: 10px;

      color: #8B949E
    }

    }

      background: #1C2128;

      border-radius: 8px;
      padding: 14px;
      font-size: 11px;
      color: #E6EDF3;
      overflow-x: auto;
      margin-top: 16px;

    }

</head>

<body>
  <header>
    <h1>🎨 Icon Keuzetool — Factory Manager</h1>
    <p>Klik A / B / C per rij om te kiezen. Huidig = Lucide &nbsp;|&nbsp; Alternatieven = Phosphor Icons</p>
  </header>
  <div class="toolbar">

    <button class="btn" onclick="all('A')">Alles → A</button>
    <button class="btn" onclick="all('B')">Alles → B</button>
    <button class="btn" onclick="reset()">Reset</button>
    <button class="btn btn-blue" onclick="exportJSON()">📋 Exporteer JSON</button>
    <span class="count">Gekozen: <strong id="cc">0</strong> / <span id="tc">0</span></span>
  </div>
  <div class="wrap">
    <table>

          <th>Optie C</th>
          <th>Keuze</th>
        </tr>

    </table>
    <pre id="out"></pre>
  </div>

    <span>Geselecteerd:</span><span class="n" id="fn">0</span><span>iconen</span>

      { l: 'WifiOff', a: ['ph:wifi-slash', 'wifi-slash'], b: ['ph:wifi-x', 'wifi-x'], c: ['ph:cell-signal-slash', 'cell-sig-slash'] },
      { l: 'Wrench', a: ['ph:wrench', 'wrench'], b: ['ph:wrench-screwdriver', 'wrench-screwdriver'], c: ['ph:hammer', 'hammer'] },
      { l: 'X', a: ['ph:x', 'x'], b: ['ph:x-circle', 'x-circle'], c: ['ph:x-square', 'x-square'] },
      { l: 'Zap', a: ['ph:lightning', 'lightning'], b: ['ph:lightning-slash', 'lightning-slash'], c: ['ph:plug', 'plug'] },
      { l: 'ZoomIn', a: ['ph:magnifying-glass-plus', 'mag-plus'], b: ['ph:magnifying-glass', 'mag-glass'], c: ['ph:zoom-in', 'zoom-in'] },
    ];

    function lId(n) { return 'lucide:' + n.replace(/([A-Z])/g, m => '-' + m.toLowerCase()).replace(/^-/, ''); }

    const choices = {};
    let cur = [...DATA];

    function ib(icon, onclick, sel) {
      return `<div class="ibox${sel ? ' sel' : ''}" onclick="${onclick}" title="${icon}">
    <span class="iconify" data-icon="${icon}" data-width="20" data-height="20"></span></div>`;
    }

    function render() {
      const q = document.getElementById('q').value.toLowerCase();
      cur = DATA.filter(r => r.l.toLowerCase().includes(q));
      document.getElementById('tc').textContent = cur.length;
      document.getElementById('tb').innerHTML = cur.map((r, i) => `
    <tr id="row-${r.l}">
      <td class="num">${String(i + 1).padStart(3, '0')}</td>
      <td><div class="iname">${r.l}</div><div class="ilib">lucide-react</div></td>
      <td>${ib(lId(r.l), '', false)}</td>
      <td><div class="owrap">${ib(r.a[0], `pick('${r.l}','A','${r.a[0]}','${r.a[1]}')`, choices[r.l] === 'A')}
        <div class="olabel">A: ${r.a[1]}</div></div></td>
      <td><div class="owrap">${ib(r.b[0], `pick('${r.l}','B','${r.b[0]}','${r.b[1]}')`, choices[r.l] === 'B')}
        <div class="olabel">B: ${r.b[1]}</div></div></td>
      <td><div class="owrap">${ib(r.c[0], `pick('${r.l}','C','${r.c[0]}','${r.c[1]}')`, choices[r.l] === 'C')}
        <div class="olabel">C: ${r.c[1]}</div></div></td>
      <td id="ch-${r.l}">${choices[r.l]
          ? `<span class="chosen">✓ ${choices[r.l]}: ${choices[r.l] === 'A' ? r.a[1] : choices[r.l] === 'B' ? r.b[1] : r.c[1]}</span>`
          : '<span class="none-lbl">—</span>'}</td>
    </tr>`).join('');
    }

    function pick(l, opt, iconId, iconName) {
      choices[l] = opt;
      const boxes = document.querySelectorAll(`#row-${l} .ibox`);
      ['A', 'B', 'C'].forEach((o, i) => boxes[i + 1] && boxes[i + 1].classList.toggle('sel', o === opt));
      document.getElementById('ch-' + l).innerHTML = `<span class="chosen">✓ ${opt}: ${iconName}</span>`;
      updateCt();
    }

    function updateCt() {
      const n = Object.keys(choices).length;
      document.getElementById('cc').textContent = n;
      document.getElementById('fn').textContent = n;
    }

    function all(opt) { DATA.forEach(r => { choices[r.l] = opt; }); render(); updateCt(); }
    function reset() { Object.keys(choices).forEach(k => delete choices[k]); render(); updateCt(); }

    function exportJSON() {
      const out = {};
      DATA.forEach(r => {
        if (choices[r.l]) { const o = choices[r.l].toLowerCase(); out[r.l] = { option: choices[r.l], iconify: r[o][0], name: r[o][1] }; }
      });
      const el = document.getElementById('out');
      el.style.display = 'block';
      el.textContent = JSON.stringify(out, null, 2);
      el.scrollIntoView({ behavior: 'smooth' });
    }

    render();
  </script>
</body>

</html>

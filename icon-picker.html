<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Manager — Icon Keuzetool</title>
<!-- Lucide (huidige icons) -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<!-- Phosphor Icons (nieuwe alternatieven) -->
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --card: #1C2128;
    --border: #30363D;
    --text: #E6EDF3;
    --muted: #8B949E;
    --accent: #0A84FF;
    --accent-dim: #0D2044;
    --green: #3FB950;
    --amber: #D29922;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.2px;
  }
  
  header span {
    font-size: 12px;
    color: var(--muted);
  }

  .toolbar {
    padding: 16px 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .toolbar input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-size: 13px;
    width: 240px;
    outline: none;
  }

  .toolbar input:focus { border-color: var(--accent); }

  .count-badge {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .count-badge strong { color: var(--green); }

  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #0070E0; color: white; }

  .container { padding: 24px 32px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    padding: 0 12px 12px;
    border-bottom: 1px solid var(--border);
  }

  thead th:first-child { width: 48px; }
  thead th:nth-child(2) { width: 200px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover { background: rgba(255,255,255,.02); }

  td {
    padding: 14px 12px;
    vertical-align: middle;
  }

  .row-num {
    color: var(--muted);
    font-size: 12px;
    font-family: monospace;
    text-align: right;
  }

  .icon-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    font-family: 'SF Mono', monospace;
  }

  .icon-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .icon-box {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    position: relative;
    flex-shrink: 0;
  }

  .icon-box:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-dim);
  }

  .icon-box.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }

  .icon-box.selected::after {
    content: '✓';
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--accent);
    color: white;
    font-size: 9px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    line-height: 14px;
    text-align: center;
  }

  .icon-box i, .icon-box svg {
    width: 20px;
    height: 20px;
    font-size: 20px;
  }

  .options-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .option-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 3px;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .option-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .current-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    margin: 0 8px;
  }

  .chosen-text {
    font-size: 11px;
    color: var(--green);
    min-width: 120px;
  }
  
  .chosen-none {
    font-size: 11px;
    color: var(--muted);
  }

  .export-panel {
    position: fixed;
    bottom: 24px;
    right: 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .export-text { font-size: 13px; color: var(--muted); }
  .export-count { font-size: 13px; color: var(--green); font-weight: 600; }

  pre {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    color: var(--text);
    overflow-x: auto;
    margin-top: 16px;
    display: none;
    white-space: pre-wrap;
  }

  .section-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: monospace;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🎨 Icon Keuzetool — Factory Manager</h1>
  </div>
  <span>Klik op een optie (A, B of C) om te kiezen. Huidig = Lucide. Opties = Phosphor Icons.</span>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 Zoek icoon..." oninput="filterIcons()">
  <button class="btn" onclick="selectNone()">Alle deacti­veren</button>
  <button class="btn" onclick="selectAll('A')">Alles → A</button>
  <button class="btn btn-primary" onclick="exportChoices()">📋 Exporteer keuze</button>
  <span class="count-badge">Gekozen: <strong id="chosen-count">0</strong> / <span id="total-count">0</span></span>
</div>

<div class="container">
  <table id="icon-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Lucide naam (huidig)</th>
        <th>Huidig icoon</th>
        <th>Optie A</th>
        <th>Optie B</th>
        <th>Optie C</th>
        <th>Keuze</th>
      </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
  </table>
  <pre id="export-output"></pre>
</div>

<div class="export-panel">
  <span class="export-text">Geselecteerd:</span>
  <span class="export-count" id="panel-count">0</span>
  <span class="export-text">iconen gekozen</span>
  <button class="btn btn-primary" onclick="exportChoices()">Exporteer JSON</button>
</div>

const choices = {};

function buildTable(data) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  
  data.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.dataset.lucide = row.lucide;
    
    tr.innerHTML = `
      <td class="row-num">${(i+1).toString().padStart(3,'0')}</td>
      <td><span class="icon-name">${row.name}</span></td>
      <td>
        <div class="icon-cell">
          <div class="icon-box current-box" title="Huidig: ${row.lucide}">
            <i data-lucide="${row.lucide.toLowerCase().replace(/([A-Z])/g,'-$1').replace(/^-/,'').toLowerCase()}"></i>
          </div>
          <span style="font-size:10px;color:var(--muted)">Lucide</span>
        </div>
      </td>
      <td>
        <div class="option-wrap">
          <div class="icon-box opt-box ${choices[row.lucide] === 'A' ? 'selected' : ''}" 
               onclick="choose('${row.lucide}','A','${row.a[0]}','${row.a[1]}')" 
               title="Optie A: ${row.a[1]}">
            <i class="ph ${row.a[0]}"></i>
          </div>
          <span class="option-label">A: ${row.a[1]}</span>
        </div>
      </td>
      <td>
        <div class="option-wrap">
          <div class="icon-box opt-box ${choices[row.lucide] === 'B' ? 'selected' : ''}" 
               onclick="choose('${row.lucide}','B','${row.b[0]}','${row.b[1]}')" 
               title="Optie B: ${row.b[1]}">
            <i class="ph ${row.b[0]}"></i>
          </div>
          <span class="option-label">B: ${row.b[1]}</span>
        </div>
      </td>
      <td>
        <div class="option-wrap">
          <div class="icon-box opt-box ${choices[row.lucide] === 'C' ? 'selected' : ''}" 
               onclick="choose('${row.lucide}','C','${row.c[0]}','${row.c[1]}')" 
               title="Optie C: ${row.c[1]}">
            <i class="ph ${row.c[0]}"></i>
          </div>
          <span class="option-label">C: ${row.c[1]}</span>
        </div>
      </td>
      <td id="choice-${row.lucide}">
        ${choices[row.lucide] 
          ? `<span class="chosen-text">✓ Optie ${choices[row.lucide]}</span>` 
          : `<span class="chosen-none">—</span>`}
      </td>
    `;
    tbody.appendChild(tr);
  });
  
  // Re-init lucide icons
  if (window.lucide) lucide.createIcons();
  updateCount();
  document.getElementById('total-count').textContent = data.length;
}

function choose(lucideName, option, phosphorClass, phosphorName) {
  choices[lucideName] = option;
  
  // Update row visuals
  const rows = document.querySelectorAll(`tr[data-lucide="${lucideName}"] .opt-box`);
  rows.forEach((box, i) => {
    box.classList.toggle('selected', ['A','B','C'][i] === option);
  });
  
  document.getElementById(`choice-${lucideName}`).innerHTML = 
    `<span class="chosen-text">✓ Optie ${option}: <span style="font-family:monospace;font-size:11px">${phosphorClass}</span></span>`;
  
  updateCount();
}

function updateCount() {
  const n = Object.keys(choices).length;
  document.getElementById('chosen-count').textContent = n;
  document.getElementById('panel-count').textContent = n;
}

function selectAll(opt) {
  ICON_MAP.forEach(row => {
    const key = opt === 'A' ? 'a' : opt === 'B' ? 'b' : 'c';
    choices[row.lucide] = opt;
  });
  buildTable(currentData);
}

function selectNone() { 
  Object.keys(choices).forEach(k => delete choices[k]); 
  buildTable(currentData); 
}

function filterIcons() {
  const q = document.getElementById('search').value.toLowerCase();
  currentData = ICON_MAP.filter(r => r.name.toLowerCase().includes(q));
  buildTable(currentData);
}

function exportChoices() {
  const result = {};
  ICON_MAP.forEach(row => {
    if (choices[row.lucide]) {
      const opt = choices[row.lucide];
      const key = opt.toLowerCase();
      result[row.lucide] = {
        option: opt,
        phosphorClass: row[key][0],
        phosphorName: row[key][1]
      };
    }
  });
  const pre = document.getElementById('export-output');
  pre.style.display = 'block';
  pre.textContent = JSON.stringify(result, null, 2);
  pre.scrollIntoView({ behavior: 'smooth' });
}

let currentData = [...ICON_MAP];
buildTable(currentData);
